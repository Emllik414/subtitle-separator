name: Test subtitle tool

on:
  push:
    branches:
      - agent/apple-style-ui-redesign
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -q -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Run regression suite
        id: regression
        shell: bash
        run: |
          set +e
          python tests/test_all.py > test-output.txt 2>&1
          status=$?
          cat test-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt

      - name: Fail when tests failed
        if: steps.regression.outputs.status != '0'
        run: exit 1
